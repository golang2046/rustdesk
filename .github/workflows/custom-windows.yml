name: Custom-Windows-Build
on:
  workflow_dispatch: # 手动触发

jobs:
  build:
    name: Build Custom Client
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # 升级到 v4
        with:
          submodules: recursive 

      - name: Patch Config
        shell: pwsh
        run: |
          # 自动定位并修改硬编码地址
          $files = Get-ChildItem -Recurse -Filter "config.rs"
          foreach ($f in $files) {
              $content = Get-Content $f.FullName
              if ($content -match 'get_option\("id-server"\)') {
                  $content = $content -replace 'get_option\("id-server"\)', '"${{ secrets.RS_ID_SERVER }}"'
                  $content = $content -replace 'get_option\("relay-server"\)', '"${{ secrets.RS_RELAY_SERVER }}"'
                  $content = $content -replace 'get_option\("key"\)', '"${{ secrets.RS_PUB_KEY }}"'
                  $content | Set-Content $f.FullName
                  Write-Host "已成功注入配置到: $($f.FullName)"
              }
          }

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Executable
        shell: pwsh
        run: |
          # 根据你的仓库版本，如果 build.py 不存在，请尝试直接使用 cargo 编译
          python build.py --hwcodec

      - name: Upload Artifact
        uses: actions/upload-artifact@v4 # 核心修复点：必须是 v4
        with:
          name: My-RustDesk-Custom
          path: target/release/rustdesk.exe
